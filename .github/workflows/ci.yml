name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  BuildTestAndAnalyze:
    runs-on: ubuntu-latest
    container:
      image: swift:6.3.1
    env:
      DOCKER_BUILDKIT: 1
      COMPOSE_DOCKER_CLI_BUILD: 1
    steps:
      - name: Install dependencies
        run: apt-get update && apt-get install -y curl unzip docker.io docker-buildx
      - uses: actions/checkout@v6
      - name: Diagnose Docker setup
        run: |
          echo "::group::docker version"; docker version || true; echo "::endgroup::"
          echo "::group::docker info";    docker info    || true; echo "::endgroup::"
          echo "::group::docker buildx ls"; docker buildx ls || true; echo "::endgroup::"
          echo "::group::docker network ls"; docker network ls || true; echo "::endgroup::"
          echo "::group::/var/run/docker.sock"; ls -la /var/run/docker.sock || true; echo "::endgroup::"
          echo "::group::Sanity-check -P with a known-good image (nginx)"
          docker pull nginx:alpine
          NID=$(docker run -d -P nginx:alpine)
          sleep 1
          echo "--- nginx state ---"
          docker inspect "$NID" --format 'Running={{.State.Running}} Status={{.State.Status}} ExitCode={{.State.ExitCode}}'
          echo "--- nginx NetworkSettings.Ports ---"
          docker inspect "$NID" --format '{{json .NetworkSettings.Ports}}'
          echo "--- docker port ---"
          docker port "$NID" || true
          docker rm -f "$NID" >/dev/null
          echo "::endgroup::"
          echo "::group::Build + inspect taskcluster image"
          docker build --tag diag/taskcluster:test --file Dockerfile . || true
          docker image inspect diag/taskcluster:test \
            --format '{{json .Config.ExposedPorts}}' || true
          echo "--- run + check whether it stays up ---"
          CID=$(docker run -d -P diag/taskcluster:test) || true
          sleep 2
          echo "--- taskcluster state ---"
          docker inspect "$CID" --format 'Running={{.State.Running}} Status={{.State.Status}} ExitCode={{.State.ExitCode}}' || true
          echo "--- taskcluster NetworkSettings.Ports ---"
          docker inspect "$CID" --format '{{json .NetworkSettings.Ports}}' || true
          echo "--- docker port ---"
          docker port "$CID" || true
          echo "--- last 50 lines of container logs ---"
          docker logs --tail 50 "$CID" 2>&1 || true
          docker rm -f "$CID" >/dev/null || true
          docker rmi diag/taskcluster:test >/dev/null || true
          echo "::endgroup::"
      - name: Build
        run: swift build -c release -Xswiftc -strict-concurrency=complete
      - name: Run tests
        run: swift test -v 2>&1 | tee build.log
      - name: Install SwiftLint
        run: |
          curl -sL https://github.com/realm/SwiftLint/releases/download/0.63.2/swiftlint_linux_amd64.zip -o swiftlint.zip
          unzip -o swiftlint.zip -d /usr/local/bin
          chmod +x /usr/local/bin/swiftlint
      - name: Analyze unused imports
        run: swiftlint analyze --strict --quiet --compiler-log-path build.log
  SwiftLint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: SwiftLint
        uses: norio-nomura/action-swiftlint@3.2.1
  SwiftFormat:
    runs-on: ubuntu-latest
    container:
      image: swift:6.3.1
    steps:
      - uses: actions/checkout@v6
      - name: Run swift-format
        run: swift-format format --recursive --in-place .
      - name: Check for formatting differences
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git diff --exit-code
  Coverage:
    runs-on: ubuntu-latest
    container:
      image: swift:6.3.1
    env:
      DOCKER_BUILDKIT: 1
      COMPOSE_DOCKER_CLI_BUILD: 1
    steps:
      - name: Install dependencies
        run: apt-get update && apt-get install -y curl docker.io docker-buildx
      - uses: actions/checkout@v6
      - name: Run tests with coverage
        run: swift test --enable-code-coverage --xunit-output test-results.xml
      - name: Convert to LCOV
        run: |
          BIN=$(swift build --show-bin-path)
          llvm-cov export \
            -format=lcov \
            -instr-profile=.build/debug/codecov/default.profdata \
            "$BIN/task-clusterPackageTests.xctest" \
            -ignore-filename-regex=".build|Tests" \
            > coverage.lcov
      - name: Upload coverage
        uses: codecov/codecov-action@v5
        if: always()
        with:
          files: coverage.lcov
          fail_ci_if_error: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      - name: Upload test results
        uses: codecov/codecov-action@v5
        if: always()
        with:
          files: test-results.xml
          report_type: test_results
          fail_ci_if_error: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
  APIBreakage:
    runs-on: ubuntu-latest
    container:
      image: swift:6.3.1
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Check for API breaking changes
        run: |                                                                                                                                                                  
          git config --global --add safe.directory "$GITHUB_WORKSPACE"                                                                                                          
          swift package diagnose-api-breaking-changes origin/main
